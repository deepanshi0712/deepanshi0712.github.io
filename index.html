<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn – Sign in</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }
    body{
      background:#f3f2ef;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }
    .container{
      width:352px;
    }
    .card{
      background:#fff;
      padding:24px;
      border-radius:8px;
      box-shadow:0 4px 12px rgba(0,0,0,.08);
    }
    .logo{
      font-size:32px;
      font-weight:700;
      color:#0a66c2;
      margin-bottom:16px;
    }
    h1{
      font-size:24px;
      font-weight:600;
      margin-bottom:4px;
    }
    .sub{
      font-size:14px;
      color:#666;
      margin-bottom:20px;
    }
    .field{
      width:100%;
      padding:14px 12px;
      border:1px solid #ccc;
      border-radius:4px;
      font-size:14px;
      margin-bottom:12px;
    }
    .field:focus{
      outline:none;
      border-color:#0a66c2;
    }
    .forgot{
      display:inline-block;
      margin:8px 0 20px;
      font-size:14px;
      color:#0a66c2;
      text-decoration:none;
      font-weight:500;
    }
    .forgot:hover{text-decoration:underline;}
    .primary{
      width:100%;
      padding:12px;
      background:#0a66c2;
      color:#fff;
      border:none;
      border-radius:24px;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
    }
    .primary:hover{background:#004182;}
    .divider{
      text-align:center;
      margin:16px 0;
      color:#999;
      font-size:14px;
    }
    .social{
      width:100%;
      padding:10px;
      border:1px solid #ccc;
      border-radius:24px;
      background:#fff;
      font-size:15px;
      font-weight:500;
      cursor:pointer;
    }
    .signup{
      text-align:center;
      font-size:14px;
      margin-top:16px;
    }
    .signup a{
      color:#0a66c2;
      font-weight:600;
      text-decoration:none;
    }
    .signup a:hover{text-decoration:underline;}
    .footer{
      display:flex;
      flex-wrap:nowrap;
      justify-content:center;
      align-items:center;
      gap:16px;
      font-size:12px;
      color:#777;
      margin-top:28px;
      white-space:nowrap;
    }
    .footer a{
      color:#666;
      text-decoration:none;
    }
    .footer a:hover{
      text-decoration:underline;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-left">
      <span class="nav-logo">Linked</span><span class="nav-logo in">in</span>
    </div>
    <div class="nav-right">
      <a href="#">Join now</a>
      <button class="nav-btn">Sign in</button>
    </div>
  </nav>

  <div class="container main">
    <div class="card">
      <h1>Sign in</h1>
      <div class="sub">Stay updated on your professional world</div>

      <input class="field" type="text" placeholder="Email or Phone" />
      <input class="field" type="password" placeholder="Password" />

      <a href="#" class="forgot">Forgot password?</a>

      <button class="primary">Sign in</button>

      <div class="divider">or</div>

      <button class="social">Sign in with Apple</button>

      <div class="signup">
        New to LinkedIn ? <a href="#">Join now</a>
      </div>
    </div>

    <div class="footer">
      <a href="#">About</a>
      <a href="#">Accessibility</a>
      <a href="#">User Agreement</a>
      <a href="#">Privacy Policy</a>
      <a href="#">Cookie Policy</a>
      <a href="#">Copyright Policy</a>
      <a href="#">Brand Policy</a>
      <a href="#">Guest Controls</a>
      <a href="#">Community Guidelines</a>
      <span>LinkedIn © 2025</span>
    </div>
  </div>
</body>
</html>
